name: Keep Supabase Alive

on:
  schedule:
    # Kjører hver 5. dag kl 07:13 UTC (09:13 norsk sommertid)
    # Supabase pauser etter 7 dager inaktivitet, så dette gir god margin
    - cron: '13 7 */5 * *'
  workflow_dispatch: # Manuell trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 500 ]; then
            echo "✅ Supabase is alive"
          else
            echo "❌ Supabase might be down (HTTP $response)"
            exit 1
          fi
